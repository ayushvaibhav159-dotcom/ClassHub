<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassHub Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#121212;
color:white;
}

nav{
background:#1f1f1f;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav-links a{
color:white;
text-decoration:none;
margin-right:20px;
font-weight:bold;
}

.logout-btn{
background:red;
border:none;
padding:10px 15px;
color:white;
border-radius:8px;
cursor:pointer;
}

header{
background:#1f1f1f;
padding:25px;
text-align:center;
}

#profilePic{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

.container{
padding:20px;
}

.card{
background:#1e1e1e;
padding:25px;
border-radius:12px;
margin-bottom:15px;
}

.card h2{
margin-bottom:10px;
}

.notice{
color:#FFD700;
}

.assignment{
color:#00FF99;
}

.exam{
color:#FF6666;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
padding:10px;
cursor:pointer;
}

</style>
</head>

<body>

<nav>

<div class="nav-links">
<a href="dashboard.html">Dashboard</a>
<a href="timetable.html">Timetable</a>
<a href="attendance.html">Attendance</a>
<a href="assignments.html">Assignments</a>
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</nav>

<header>

<img
id="profilePic"
src=""
alt="Profile Photo">

<h1 id="welcomeUser">
Welcome
</h1>

<p id="userEmail"></p>

</header>

<div class="container">

<div class="card">

<h2>Today's Classes</h2>

<p>09:00 AM - DSA</p>
<p>10:00 AM - OOP</p>
<p>11:00 AM - COA</p>

</div>

<div class="card">

<h2>Attendance</h2>

<p>
Current Attendance:
<strong>82%</strong>
</p>

</div>

<div class="card">

<h2>Safe Bunk Calculator</h2>

<input
type="number"
id="totalClasses"
placeholder="Total Classes">

<input
type="number"
id="presentClasses"
placeholder="Present Classes">

<button onclick="calculateBunk()">
Calculate
</button>

<p id="bunkResult"></p>

</div>

<div class="card notice">

<h2 id="noticeTitle">
No Notice
</h2>

<p id="noticeText">
No Notice Available
</p>

</div>

<div class="card assignment">

<h2>Assignment</h2>

<p id="assignmentTitle">
No Assignment
</p>

<p id="assignmentDate"></p>

</div>

<div class="card exam">

<h2>Exam Countdown</h2>

<p id="countdown"></p>

</div>

</div>

<script>

const userName =
localStorage.getItem("userName");

const userEmail =
localStorage.getItem("userEmail");

const userPhoto =
localStorage.getItem("userPhoto");

if(!userName){

window.location.href =
"login.html";

}

document.getElementById("welcomeUser")
.innerHTML =
"Welcome, " + userName + " 👋";

document.getElementById("userEmail")
.innerHTML =
userEmail || "";

if(userPhoto){

document.getElementById("profilePic")
.src = userPhoto;

}

function logout(){

localStorage.clear();

window.location.href =
"login.html";

}

const examDate =
new Date("2026-10-12");

function updateCountdown(){

const today =
new Date();

const diff =
examDate - today;

const days =
Math.floor(
diff / (1000*60*60*24)
);

document.getElementById("countdown")
.innerHTML =
days + " Days Remaining";

}

updateCountdown();

document.getElementById("assignmentTitle")
.innerHTML =
localStorage.getItem("assignmentTitle")
|| "No Assignment";

document.getElementById("assignmentDate")
.innerHTML =
localStorage.getItem("assignmentDate")
|| "";

document.getElementById("noticeTitle")
.innerHTML =
localStorage.getItem("noticeTitle")
|| "No Notice";

document.getElementById("noticeText")
.innerHTML =
localStorage.getItem("noticeText")
|| "No Notice Available";

function calculateBunk(){

let total =
parseInt(
document.getElementById("totalClasses").value
);

let present =
parseInt(
document.getElementById("presentClasses").value
);

if(isNaN(total) || isNaN(present)){

alert("Enter values");

return;

}

let safeBunks =
Math.floor(
(present - (0.75 * total))
/ 0.75
);

if(safeBunks < 0){

safeBunks = 0;

}

document.getElementById("bunkResult")
.innerHTML =
"You can miss " +
safeBunks +
" classes and remain above 75% attendance.";

}

</script>

</body>
</html>

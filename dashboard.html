<body>

<nav>

<a href="attendance.html">Attendance</a>
<a href="assignments.html">Assignments</a>
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</nav>

<header>

<img
id="profilePic"
src=""
alt="Profile Photo">

<h1 id="welcomeUser">
Welcome
</h1>

<p id="userEmail"></p>

</header>

<div class="container">

<div class="card">

<h2>Today's Classes</h2>

<p>09:00 AM - DSA</p>
<p>10:00 AM - OOP</p>
<p>11:00 AM - COA</p>

</div>

<div class="card">

<h2>Attendance</h2>

<p>
Current Attendance:
<strong>82%</strong>
</p>

</div>

<div class="card">

<h2>Safe Bunk Calculator</h2>

<input
type="number"
id="totalClasses"
placeholder="Total Classes">

<input
type="number"
id="presentClasses"
placeholder="Present Classes">

<button onclick="calculateBunk()">
Calculate
</button>

<p id="bunkResult"></p>

</div>

<div class="card notice">

<h2 id="noticeTitle">
Loading Notice...
</h2>

<p id="noticeText">
Please wait...
</p>

</div>

<div class="card assignment">

<h2>Assignment</h2>

<p id="assignmentTitle">
Loading...
</p>

<p id="assignmentDate">
Please wait...
</p>

</div>

<div class="card exam">

<h2>Exam Countdown</h2>

<p id="countdown"></p>

</div>

</div>

<script>

const userName =
localStorage.getItem("userName");

const userEmail =
localStorage.getItem("userEmail");

const userPhoto =
localStorage.getItem("userPhoto");

if(!userName){

window.location.href =
"login.html";

}

document.getElementById("welcomeUser")
.innerHTML =
"Welcome, " + userName + " 👋";

document.getElementById("userEmail")
.innerHTML =
userEmail || "";

if(userPhoto){

document.getElementById("profilePic")
.src = userPhoto;

}

function logout(){

localStorage.clear();

window.location.href =
"login.html";

}

const examDate =
new Date("2026-10-12");

function updateCountdown(){

const today =
new Date();

const diff =
examDate - today;

const days =
Math.floor(
diff / (1000*60*60*24)
);

document.getElementById("countdown")
.innerHTML =
days + " Days Remaining";

}

updateCountdown();

function calculateBunk(){

let total =
parseInt(
document.getElementById("totalClasses").value
);

let present =
parseInt(
document.getElementById("presentClasses").value
);

if(isNaN(total) || isNaN(present)){

alert("Enter values");
return;

}

let safeBunks =
Math.floor(
(present - (0.75 * total))
/ 0.75
);

if(safeBunks < 0){

safeBunks = 0;

}

document.getElementById("bunkResult")
.innerHTML =
"You can miss " +
safeBunks +
" classes and remain above 75% attendance.";

}

</script>

<script type="module">

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

try{

const noticeRef =
doc(db, "notices", "latest");

const noticeSnap =

if(noticeSnap.exists()){

document.getElementById("noticeTitle")

document.getElementById("noticeText")
.innerHTML =

}
else{

document.getElementById("noticeTitle")
.innerHTML =
"No Notice";

document.getElementById("noticeText")
.innerHTML =
"No Notice Available";

}

}
catch(error){

document.getElementById("noticeTitle")
.innerHTML =
"No Notice";

document.getElementById("noticeText")
.innerHTML =
"Unable to load notice.";

}

try{

const assignmentRef =
doc(db, "assignments", "latest");

const assignmentSnap =
await getDoc(assignmentRef);

if(assignmentSnap.exists()){

document.getElementById("assignmentTitle")
.innerHTML =
assignmentSnap.data().title;

document.getElementById("assignmentDate")
.innerHTML =
assignmentSnap.data().date;

}
else{

document.getElementById("assignmentTitle")
.innerHTML =
"No Assignment";

document.getElementById("assignmentDate")
.innerHTML =
"";

}

}
catch(error){

document.getElementById("assignmentTitle")
.innerHTML =
"No Assignment";

document.getElementById("assignmentDate")
.innerHTML =
"Unable to load assignment.";

}

</script>

</body>

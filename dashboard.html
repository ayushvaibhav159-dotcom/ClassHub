<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassHub Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#121212;
    color:white;
}

nav{
    background:#1f1f1f;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-right:20px;
    font-weight:bold;
}

.logout-btn{
    background:red;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}

header{
    background:#1f1f1f;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:#1e1e1e;
    padding:20px;
    margin-bottom:15px;
    border-radius:10px;
}

.card h2{
    margin-bottom:10px;
}

input{
    padding:8px;
    margin:5px;
}

button{
    padding:8px 15px;
    cursor:pointer;
}

.notice{
    color:#ffd700;
}

.assignment{
    color:#00ff99;
}

.exam{
    color:#ff6666;
}
</style>

</head>
<body>

<nav>

<div class="nav-links">
<a href="dashboard.html">Dashboard</a>
<a href="timetable.html">Timetable</a>
<a href="attendance.html">Attendance</a>
<a href="assignments.html">Assignments</a>
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</nav>

<header id="welcomeUser">
ClassHub Dashboard
</header>

<div class="container">

<div class="card">
<h2>Today's Classes</h2>
<p>09:00 AM - DSA</p>
<p>10:00 AM - OOP</p>
<p>11:00 AM - COA</p>
</div>

<div class="card">
<h2>Attendance</h2>
<p>Current Attendance: <strong>82%</strong></p>
</div>

<div class="card">

<h2>Safe Bunk Calculator</h2>

<input
type="number"
id="totalClasses"
placeholder="Total Classes">

<input
type="number"
id="presentClasses"
placeholder="Present Classes">

<button onclick="calculateBunk()">
Calculate
</button>

<p id="bunkResult"></p>

</div>

<div class="card notice">
<h2 id="noticeTitle">No Notice</h2>
<p id="noticeText">No Notice Available</p>
</div>

<div class="card assignment">
<h2>Assignment</h2>
<p id="assignmentTitle">
No Assignment
</p>
<p id="assignmentDate"></p>
</div>

<div class="card exam">
<h2>Exam Countdown</h2>
<p id="countdown"></p>
</div>

</div>

<script>

// Welcome User

const userName =
localStorage.getItem("userName");

if(userName){

document.getElementById("welcomeUser").innerHTML =
"Welcome, " + userName + " 👋";

}

// Logout

function logout(){

localStorage.removeItem("userName");
localStorage.removeItem("userEmail");

window.location.href =
"login.html";

}

// Exam Countdown

const examDate =
new Date("2026-10-12");

function updateCountdown(){

const today =
new Date();

const diff =
examDate - today;

const days =
Math.floor(
diff / (1000 * 60 * 60 * 24)
);

document.getElementById("countdown").innerHTML =
days + " Days Remaining";

}

updateCountdown();

// Notice

let savedTitle =
localStorage.getItem("noticeTitle");

let savedText =
localStorage.getItem("noticeText");

if(savedTitle){

document.getElementById("noticeTitle").innerHTML =
savedTitle;

}

if(savedText){

document.getElementById("noticeText").innerHTML =
savedText;

}

// Assignment

document.getElementById("assignmentTitle").innerHTML =
localStorage.getItem("assignmentTitle") ||
"No Assignment";

document.getElementById("assignmentDate").innerHTML =
localStorage.getItem("assignmentDate") ||
"";

// Safe Bunk Calculator

function calculateBunk(){

let total =
parseInt(
document.getElementById("totalClasses").value
);

let present =
parseInt(
document.getElementById("presentClasses").value
);

if(isNaN(total) || isNaN(present)){

alert("Enter values");

return;

}

let safeBunks =
Math.floor(
(present - (0.75 * total)) / 0.75
);

if(safeBunks < 0){

safeBunks = 0;

}

document.getElementById("bunkResult").innerHTML =
"You can miss " +
safeBunks +
" more classes and still stay above 75%";

}

</script>

</body>
</html>

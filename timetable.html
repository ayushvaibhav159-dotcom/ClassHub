<h1>Weekly Timetable</h1>

<div class="card">
<h2>Monday</h2>
<p id="monday">Loading...</p>
</div>

<div class="card">
<h2>Tuesday</h2>
<p id="tuesday">Loading...</p>
</div>

<div class="card">
<h2>Wednesday</h2>
<p id="wednesday">Loading...</p>
</div>

<div class="card">
<h2>Thursday</h2>
<p id="thursday">Loading...</p>
</div>

<div class="card">
<h2>Friday</h2>
<p id="friday">Loading...</p>
</div>

<div class="card">
<h2>Saturday</h2>
<p id="saturday">Loading...</p>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC4Qfh7ZuUsMmOjI5nqsBQBC31853L0NZE",
authDomain: "classhub-45a9b.firebaseapp.com",
projectId: "classhub-45a9b",
storageBucket: "classhub-45a9b.firebasestorage.app",
messagingSenderId: "433119734739",
appId: "1:433119734739:web:90d2c4efdb6c89d6a61d26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

try{

    const timetableRef =
    doc(db, "timetable", "week");

    const timetableSnap =
    await getDoc(timetableRef);

    if(timetableSnap.exists()){

        const data =
        timetableSnap.data();

        document.getElementById("monday").innerHTML =
        data.monday || "No Class";

        document.getElementById("tuesday").innerHTML =
        data.tuesday || "No Class";

        document.getElementById("wednesday").innerHTML =
        data.wednesday || "No Class";

        document.getElementById("thursday").innerHTML =
        data.thursday || "No Class";

        document.getElementById("friday").innerHTML =
        data.friday || "No Class";

        document.getElementById("saturday").innerHTML =
        data.saturday || "No Class";

    }
    else{

        document.getElementById("monday").innerHTML = "No Class";
        document.getElementById("tuesday").innerHTML = "No Class";
        document.getElementById("wednesday").innerHTML = "No Class";
        document.getElementById("thursday").innerHTML = "No Class";
        document.getElementById("friday").innerHTML = "No Class";
        document.getElementById("saturday").innerHTML = "No Class";

    }

}
catch(error){

    console.log(error);

}

</script>

</body>

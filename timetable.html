<h1>Weekly Timetable</h1>

<div class="card">
<h2>Monday</h2>
<p id="monday"></p>
</div>

<div class="card">
<h2>Tuesday</h2>
<p id="tuesday"></p>
</div>

<div class="card">
<h2>Wednesday</h2>
<p id="wednesday"></p>
</div>

<div class="card">
<h2>Thursday</h2>
<p id="thursday"></p>
</div>

<div class="card">
<h2>Friday</h2>
<p id="friday"></p>
</div>

<script>

document.getElementById("monday").innerHTML =
localStorage.getItem("monday");

document.getElementById("tuesday").innerHTML =
localStorage.getItem("tuesday");

document.getElementById("wednesday").innerHTML =
localStorage.getItem("wednesday");

document.getElementById("thursday").innerHTML =
localStorage.getItem("thursday");

document.getElementById("friday").innerHTML =
localStorage.getItem("friday");

</script>

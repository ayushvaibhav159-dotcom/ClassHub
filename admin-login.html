<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body{
    background:#121212;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.login-box{
    background:#1f1f1f;
    padding:40px;
    width:350px;
    border-radius:15px;
    text-align:center;
}

h1{
    color:white;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#4285F4;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#3367D6;
}

.error{
    color:red;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="login-box">

<h1>Admin Login</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="loginAdmin()">
Login
</button>

<p class="error" id="error"></p>

</div>

<script>

function loginAdmin(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

if(
username === "ayushadmin" &&
password === "ClassHub2026"
){

localStorage.setItem(
"adminLoggedIn",
"true"
);

window.location.href =
"admin.html";

}
else{

document.getElementById("error").innerHTML =
"Invalid Username or Password";

}

}

</script>

</body>
</html>

<!DOCTYPE html>

<html>
<head>
<title>Admin Login</title>

<style>
body{
    background:#121212;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.login-box{
    background:#1f1f1f;
    padding:40px;
    border-radius:15px;
    width:400px;
    text-align:center;
}

h1{
    color:white;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    background:#4285F4;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#3367D6;
}
</style>

</head>
<body>

<div class="login-box">

<h1>Admin Login</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script>

function login(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(
        username === "ayushadmin" &&
        password === "ClassHub2026"
    ){

        localStorage.setItem(
        "isAdmin",
        "true"
        );

        window.location.href =
        "admin.html";

    }
    else{

        alert(
        "Invalid Username or Password"
        );

    }

}

</script>

</body>
</html>

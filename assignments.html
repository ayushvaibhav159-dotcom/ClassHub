<h1>Assignments</h1>

<div class="card">

<h2 id="assignmentTitle">
Loading...
</h2>

<p id="assignmentDate">
Loading...
</p>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC4Qfh7ZuUsMmOjI5nqsBQBC31853L0NZE",
authDomain: "classhub-45a9b.firebaseapp.com",
projectId: "classhub-45a9b",
storageBucket: "classhub-45a9b.firebasestorage.app",
messagingSenderId: "433119734739",
appId: "1:433119734739:web:90d2c4efdb6c89d6a61d26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

try{

    const assignmentRef =
    doc(db, "assignments", "latest");

    const assignmentSnap =
    await getDoc(assignmentRef);

    if(assignmentSnap.exists()){

        const data =
        assignmentSnap.data();

        document.getElementById("assignmentTitle")
        .innerHTML =
        data.title || "No Assignment";

        document.getElementById("assignmentDate")
        .innerHTML =
        data.date || "";

    }
    else{

        document.getElementById("assignmentTitle")
        .innerHTML =
        "No Assignment";

        document.getElementById("assignmentDate")
        .innerHTML =
        "";

    }

}
catch(error){

    console.log(error);

}

</script>

</body>

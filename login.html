<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassHub Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#121212;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#1e1e1e;
    padding:30px;
    width:350px;
    border-radius:15px;
    text-align:center;
}

h1{
    color:white;
    margin-bottom:20px;
}

.google-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4285F4;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.google-btn:hover{
    background:#357ae8;
}
</style>

</head>
<body>

<div class="login-box">

<h1>ClassHub</h1>

<button class="google-btn" id="googleLogin">
Sign in with Google
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC4Qfh7ZuUsMmOjI5nqsBQBC31853L0NZE",
  authDomain: "classhub-45a9b.firebaseapp.com",
  projectId: "classhub-45a9b",
  storageBucket: "classhub-45a9b.firebasestorage.app",
  messagingSenderId: "433119734739",
  appId: "1:433119734739:web:90d2c4efdb6c89d6a61d26"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

document
.getElementById("googleLogin")
.addEventListener("click", async () => {

try {

const result = await signInWithPopup(auth, provider);

localStorage.setItem(
"userName",
result.user.displayName
);

localStorage.setItem(
"userEmail",
result.user.email
);

window.location.href = "dashboard.html";

}
catch(error){

alert(error.message);

}

});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassHub Login</title>

<style>
body{
background:#121212;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
}

.login-box{
background:#1f1f1f;
padding:40px;
border-radius:15px;
text-align:center;
width:350px;
}

h1{
color:white;
margin-bottom:25px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:8px;
background:#4285F4;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#3367D6;
}
</style>

</head>

<body>

<div class="login-box">

<h1>ClassHub</h1>

<button id="googleLogin">
Sign in with Google
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyC4Qfh7ZuUsMmOjI5nqsBQBC31853L0NZE",
authDomain: "classhub-45a9b.firebaseapp.com",
projectId: "classhub-45a9b",
storageBucket: "classhub-45a9b.firebasestorage.app",
messagingSenderId: "433119734739",
appId: "1:433119734739:web:90d2c4efdb6c89d6a61d26"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

document
.getElementById("googleLogin")
.addEventListener("click", async () => {

try{

const result =
await signInWithPopup(auth, provider);

localStorage.setItem(
"userName",
result.user.displayName
);

localStorage.setItem(
"userEmail",
result.user.email
);

localStorage.setItem(
"userPhoto",
result.user.photoURL
);

window.location.href =
"dashboard.html";

}
catch(error){

alert(error.message);

}

});

</script>

</body>
</html>

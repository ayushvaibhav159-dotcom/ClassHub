<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassHub Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#1e1e1e;
    padding:30px;
    width:350px;
    border-radius:15px;
    color:white;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#45a049;
}

.error{
    color:red;
    margin-top:10px;
    text-align:center;
}
</style>

</head>
<body>

<div class="login-box">

<h1>ClassHub</h1>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p class="error" id="error"></p>

</div>

<script>

function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(email==="admin@classhub.com" && password==="admin123"){

window.location.href="dashboard.html";

}
else{

document.getElementById("error").innerHTML =
"Invalid Email or Password";

}

}

</script>

</body>
</html>

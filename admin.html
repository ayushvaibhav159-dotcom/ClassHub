<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script>
// Protect Admin Panel
if (localStorage.getItem("adminLoggedIn") !== "true") {
    window.location.href = "admin-login.html";
}
</script>

<style>
body{
    background:#121212;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    padding:10px 20px;
    background:green;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:15px;
}

.logout-btn{
    background:red;
    float:right;
}
</style>

</head>
<body>

<button class="logout-btn" onclick="logoutAdmin()">
Logout
</button>

<h1>Admin Panel</h1>

<h2>Add Notice</h2>

<input
type="text"
id="noticeTitle"
placeholder="Notice Title">

<textarea
id="noticeText"
placeholder="Notice Description">
</textarea>

<button onclick="saveNotice()">
Save Notice
</button>

<h2>Monday</h2>
<textarea id="monday"></textarea>

<h2>Tuesday</h2>
<textarea id="tuesday"></textarea>

<h2>Wednesday</h2>
<textarea id="wednesday"></textarea>

<h2>Thursday</h2>
<textarea id="thursday"></textarea>

<h2>Friday</h2>
<textarea id="friday"></textarea>

<button onclick="saveTimetable()">
Save Timetable
</button>

<h2>Assignment</h2>

<input
type="text"
id="assignmentTitle"
placeholder="Assignment Title">

<input
type="date"
id="assignmentDate">

<button onclick="saveAssignment()">
Save Assignment
</button>

<script>

// Logout
function logoutAdmin(){
    localStorage.removeItem("adminLoggedIn");
    window.location.href = "admin-login.html";
}

// Save Notice
function saveNotice(){

    let title =
    document.getElementById("noticeTitle").value;

    let text =
    document.getElementById("noticeText").value;

    localStorage.setItem(
        "noticeTitle",
        title
    );

    localStorage.setItem(
        "noticeText",
        text
    );

    alert("Notice Saved");
}

// Save Timetable
function saveTimetable(){

    localStorage.setItem(
        "monday",
        document.getElementById("monday").value
    );

    localStorage.setItem(
        "tuesday",
        document.getElementById("tuesday").value
    );

    localStorage.setItem(
        "wednesday",
        document.getElementById("wednesday").value
    );

    localStorage.setItem(
        "thursday",
        document.getElementById("thursday").value
    );

    localStorage.setItem(
        "friday",
        document.getElementById("friday").value
    );

    alert("Timetable Saved");
}

// Save Assignment
function saveAssignment(){

    localStorage.setItem(
        "assignmentTitle",
        document.getElementById("assignmentTitle").value
    );

    localStorage.setItem(
        "assignmentDate",
        document.getElementById("assignmentDate").value
    );

    alert("Assignment Saved");
}

</script>

</body>
</html>

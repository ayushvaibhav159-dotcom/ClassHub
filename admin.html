<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script>
if(localStorage.getItem("adminLoggedIn") !== "true"){
    window.location.href = "admin-login.html";
}
</script>

<style>
body{
    background:#121212;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    padding:10px 20px;
    background:green;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:15px;
}

.logout-btn{
    background:red;
    float:right;
}

.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>

</head>
<body>

<button class="logout-btn" onclick="logoutAdmin()">
Logout
</button>

<h1>Admin Panel</h1>

<div class="card">

<h2>Add Notice</h2>

<input
type="text"
id="noticeTitle"
placeholder="Notice Title">

<textarea
id="noticeText"
placeholder="Notice Description">
</textarea>

<button onclick="saveNotice()">
Save Notice
</button>

</div>

<div class="card">

<h2>Monday</h2>
<textarea id="monday"></textarea>

<h2>Tuesday</h2>
<textarea id="tuesday"></textarea>

<h2>Wednesday</h2>
<textarea id="wednesday"></textarea>

<h2>Thursday</h2>
<textarea id="thursday"></textarea>

<h2>Friday</h2>
<textarea id="friday"></textarea>

<h2>Saturday</h2>
<textarea id="saturday"></textarea>

<button onclick="saveTimetable()">
Save Timetable
</button>

</div>

<div class="card">

<h2>Assignment</h2>

<input
type="text"
id="assignmentTitle"
placeholder="Assignment Title">

<input
type="date"
id="assignmentDate">

<button onclick="saveAssignment()">
Save Assignment
</button>

</div>

<div class="card">

<h2>Exam Date</h2>

<input
type="date"
id="examDate">

<button onclick="saveExamDate()">
Save Exam Date
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC4Qfh7ZuUsMmOjI5nqsBQBC31853L0NZE",
authDomain: "classhub-45a9b.firebaseapp.com",
projectId: "classhub-45a9b",
storageBucket: "classhub-45a9b.firebasestorage.app",
messagingSenderId: "433119734739",
appId: "1:433119734739:web:90d2c4efdb6c89d6a61d26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.logoutAdmin = function(){

    localStorage.removeItem("adminLoggedIn");
    window.location.href = "admin-login.html";

};

window.saveNotice = async function(){

    let title =
    document.getElementById("noticeTitle").value;

    let text =
    document.getElementById("noticeText").value;

    if(title === "" || text === ""){
        alert("Please enter notice title and description.");
        return;
    }

    try{

        await setDoc(
            doc(db, "notices", "latest"),
            {
                title: title,
                text: text
            }
        );

        alert("Notice Saved to Firebase");

        document.getElementById("noticeTitle").value = "";
        document.getElementById("noticeText").value = "";

    }
    catch(error){

        alert("Error: " + error.message);

    }

};

window.saveTimetable = async function(){

    try{

        await setDoc(
            doc(db, "timetable", "week"),
            {
                monday:
                document.getElementById("monday").value,

                tuesday:
                document.getElementById("tuesday").value,

                wednesday:
                document.getElementById("wednesday").value,

                thursday:
                document.getElementById("thursday").value,

                friday:
                document.getElementById("friday").value,

                saturday:
                document.getElementById("saturday").value
            }
        );

        alert("Timetable Saved to Firebase");

    }
    catch(error){

        alert("Error: " + error.message);

    }

};

window.saveAssignment = async function(){

    let title =
    document.getElementById("assignmentTitle").value;

    let date =
    document.getElementById("assignmentDate").value;

    if(title === "" || date === ""){
        alert("Please enter assignment title and date.");
        return;
    }

    try{

        await setDoc(
            doc(db, "assignments", "latest"),
            {
                title: title,
                date: date
            }
        );

        alert("Assignment Saved to Firebase");

        document.getElementById("assignmentTitle").value = "";
        document.getElementById("assignmentDate").value = "";

    }
    catch(error){

        alert("Error: " + error.message);

    }

};

window.saveExamDate = async function(){

    let date =
    document.getElementById("examDate").value;

    if(date === ""){
        alert("Please select an exam date.");
        return;
    }

    try{

        await setDoc(
            doc(db, "exam", "latest"),
            {
                date: date
            }
        );

        alert("Exam Date Saved to Firebase");

        document.getElementById("examDate").value = "";

    }
    catch(error){

        alert("Error: " + error.message);

    }

};

</script>

</body>
</html>

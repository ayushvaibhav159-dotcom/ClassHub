<!DOCTYPE html>

<html>
<head>
<title>Admin Panel</title>

<style>
body{
    background:#121212;
    color:white;
    font-family:Arial;
    padding:20px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px 20px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
    margin-bottom:15px;
    border-radius:5px;
}

.logout-btn{
    background:red;
}

.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>

</head>
<body>

<script>

if(localStorage.getItem("isAdmin") !== "true"){
    window.location.href = "admin-login.html";
}

</script>

<div class="top-bar">

<h1>Admin Panel</h1>

<button
class="logout-btn"
onclick="logout()">
Logout </button>

</div>

<div class="card">

<h2>Add Notice</h2>

<input
type="text"
id="noticeTitle"
placeholder="Notice Title">

<textarea
id="noticeText"
placeholder="Notice Description">
</textarea>

<button onclick="saveNotice()">
Save Notice
</button>

</div>

<div class="card">

<h2>Monday</h2>
<textarea id="monday"></textarea>

<h2>Tuesday</h2>
<textarea id="tuesday"></textarea>

<h2>Wednesday</h2>
<textarea id="wednesday"></textarea>

<h2>Thursday</h2>
<textarea id="thursday"></textarea>

<h2>Friday</h2>
<textarea id="friday"></textarea>

<button onclick="saveTimetable()">
Save Timetable
</button>

</div>

<div class="card">

<h2>Assignment</h2>

<input
type="text"
id="assignmentTitle"
placeholder="Assignment Title">

<input
type="date"
id="assignmentDate">

<button onclick="saveAssignment()">
Save Assignment
</button>

</div>

<script>

function logout(){

    localStorage.removeItem("isAdmin");

    window.location.href =
    "admin-login.html";

}

function saveNotice(){

    let title =
    document.getElementById("noticeTitle").value;

    let text =
    document.getElementById("noticeText").value;

    localStorage.setItem(
    "noticeTitle",
    title
    );

    localStorage.setItem(
    "noticeText",
    text
    );

    alert("Notice Saved");

}

function saveTimetable(){

    localStorage.setItem(
    "monday",
    document.getElementById("monday").value
    );

    localStorage.setItem(
    "tuesday",
    document.getElementById("tuesday").value
    );

    localStorage.setItem(
    "wednesday",
    document.getElementById("wednesday").value
    );

    localStorage.setItem(
    "thursday",
    document.getElementById("thursday").value
    );

    localStorage.setItem(
    "friday",
    document.getElementById("friday").value
    );

    alert("Timetable Saved");

}

function saveAssignment(){

    localStorage.setItem(
    "assignmentTitle",
    document.getElementById("assignmentTitle").value
    );

    localStorage.setItem(
    "assignmentDate",
    document.getElementById("assignmentDate").value
    );

    alert("Assignment Saved");

}

</script>

</body>
</html>
